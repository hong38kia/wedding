<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wedding Invitation</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;overflow:hidden;display:grid;place-items:center;
  font-family:Georgia,"Times New Roman",serif;color:#fff;background:#14100f;
}
.scene{
  position:relative;width:min(430px,100vw);height:100vh;overflow:hidden;
  background:
    radial-gradient(circle at 50% 18%,rgba(255,235,205,.55),transparent 28%),
    linear-gradient(180deg,#2b211f,#7a4f46 48%,#17110f);
}
.scene:before{
  content:"";position:absolute;inset:-20%;
  background:radial-gradient(circle,rgba(255,255,255,.22) 0 2px,transparent 3px);
  background-size:70px 70px;animation:sparkle 12s linear infinite;opacity:.5;
}
.scene:after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 20%,rgba(255,245,225,.25) 48%,transparent 70%);
  transform:translateX(-120%);animation:shine 5s ease-in-out infinite 4s;
}
.invite{
  position:relative;z-index:2;height:100%;padding:34px 26px 24px;
  display:flex;flex-direction:column;justify-content:space-between;text-align:center;
  opacity:0;transform:scale(.96);animation:show 1.2s ease forwards 2.6s;
}
.kicker{font-size:12px;letter-spacing:.28em;color:#f4d7a1;margin-bottom:10px}
h1{margin:0;font-size:38px;line-height:1;color:#fff8ea;font-weight:400}
.names{margin:14px 0 10px;font-size:28px;line-height:1.15;color:#fff;font-weight:400}
.amp{display:block;font-size:20px;color:#f4d7a1}
.photo{
  width:154px;height:190px;margin:10px auto 12px;padding:5px;border-radius:80px 80px 10px 10px;
  background:linear-gradient(135deg,#fff2d3,#c89b55);box-shadow:0 14px 34px rgba(0,0,0,.28);overflow:hidden;
}
.photo img{width:100%;height:100%;object-fit:cover;display:block;border-radius:inherit;border:2px solid rgba(255,255,255,.8)}
.note{
  margin:0 auto;max-width:310px;padding:12px 14px;border:1px solid rgba(244,215,161,.42);
  border-radius:8px;background:rgba(22,16,14,.36);backdrop-filter:blur(8px);
  font-size:14px;line-height:1.55;
}
.details{display:grid;gap:8px;margin-top:12px}
.detail{padding:10px 12px;background:rgba(255,255,255,.08);border-top:1px solid rgba(244,215,161,.45)}
.label{font-size:11px;letter-spacing:.22em;color:#f4d7a1;margin-bottom:4px}
.value{font-size:15px;line-height:1.45}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
.btn{
  min-height:40px;display:grid;place-items:center;border-radius:999px;text-decoration:none;
  font:600 13px/1.2 Arial,sans-serif;color:#241915;background:linear-gradient(135deg,#fff1ce,#c99a55);
}
.btn.alt{color:#fff;border:1px solid rgba(244,215,161,.5);background:rgba(255,255,255,.1)}
.footer{margin:10px 0 0;font:12px/1.5 Arial,sans-serif;color:rgba(255,255,255,.75)}
.doors{position:absolute;inset:0;z-index:8;perspective:1200px;animation:gone .1s linear forwards 3s}
.door{
  position:absolute;top:0;width:50%;height:100%;
  background:linear-gradient(180deg,#6f5148,#2a1c18);
  box-shadow:inset 0 0 55px rgba(0,0,0,.42);
}
.door:before{
  content:"";position:absolute;inset:42px 24px;border:2px solid rgba(238,207,161,.36);
  border-radius:12px;box-shadow:inset 0 0 0 8px rgba(255,255,255,.04);
}
.left{left:0;transform-origin:left center;animation:openL 2.5s cubic-bezier(.7,0,.2,1) forwards .45s}
.right{right:0;transform-origin:right center;animation:openR 2.5s cubic-bezier(.7,0,.2,1) forwards .45s}
.monogram{
  position:absolute;z-index:9;left:50%;top:50%;width:84px;height:84px;border-radius:50%;
  display:grid;place-items:center;transform:translate(-50%,-50%);
  background:radial-gradient(circle,#fff1ce,#c99a55);color:#2b1c17;font-size:24px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);animation:fade 1.2s ease forwards 1.2s;
}
.petal{
  position:absolute;z-index:3;top:-30px;width:10px;height:16px;border-radius:10px 10px 10px 2px;
  background:rgba(255,218,220,.85);animation:fall linear infinite;
}
.petal:nth-child(1){left:12%;animation-duration:8s;animation-delay:3s}
.petal:nth-child(2){left:34%;animation-duration:9s;animation-delay:3.6s}
.petal:nth-child(3){left:58%;animation-duration:7s;animation-delay:4s}
.petal:nth-child(4){left:82%;animation-duration:10s;animation-delay:3.3s}
@keyframes openL{to{transform:rotateY(-105deg)}}
@keyframes openR{to{transform:rotateY(105deg)}}
@keyframes gone{to{visibility:hidden;pointer-events:none}}
@keyframes fade{to{opacity:0;transform:translate(-50%,-50%) scale(.7)}}
@keyframes show{to{opacity:1;transform:scale(1)}}
@keyframes sparkle{to{transform:translate3d(70px,70px,0)}}
@keyframes shine{50%,100%{transform:translateX(120%)}}
@keyframes fall{
  0%{transform:translateY(-30px) rotate(0);opacity:0}
  15%{opacity:1}
  100%{transform:translateY(100vh) translateX(60px) rotate(260deg);opacity:0}
}
@media(max-height:720px){
  .invite{padding:24px 22px 18px}
  h1{font-size:32px}.names{font-size:24px}.photo{width:128px;height:156px}
  .note{font-size:13px;line-height:1.4;padding:10px 12px}
  .detail{padding:8px 10px}.value{font-size:14px}.btn{min-height:36px}
}
</style>
</head>
<body>
<div class="scene">
  <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>

  <main class="invite">
    <section>
      <div class="kicker">WEDDING INVITATION</div>
      <h1>You're Invited</h1>
      <div class="names">Michael<span class="amp">&</span>Emily</div>

      <div class="photo">
        <img src="1.jpg" alt="Wedding photo">
      </div>

      <p class="note">
        Together with our families, we joyfully invite you to celebrate our wedding dinner.
      </p>
    </section>

    <section>
      <div class="details">
        <div class="detail">
          <div class="label">DATE</div>
          <div class="value">October 18, 2026 · 6:30 PM</div>
        </div>
        <div class="detail">
          <div class="label">VENUE</div>
          <div class="value">The Grand Ballroom<br>New York, NY</div>
        </div>
      </div>

      <div class="actions">
        <a class="btn" href="mailto:example@example.com?subject=Wedding RSVP">RSVP</a>
        <a class="btn alt" href="https://maps.google.com/?q=The Grand Ballroom New York">Map</a>
      </div>

      <p class="footer">Dinner · Dancing · Celebration</p>
    </section>
  </main>

  <div class="doors">
    <div class="door left"></div>
    <div class="door right"></div>
    <div class="monogram">M&E</div>
  </div>
</div>
</body>
</html>
